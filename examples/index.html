<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../icon/favicon.png" />
    <title>glspinner</title>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: monospace;
            z-index: 999;
        }
        #startBtn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            border: 1px solid #0769ea;
            background: #111;
            color: white;
            cursor: pointer;
        }
        #fullScreenBtn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 18px;
            border: 1px solid #f71313;
            background: #111;
            color: white;
            cursor: pointer;
        }
        #startBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #fullScreenBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<!-- <script type="module" src="sessions.ts"></script> -->
<body>
    <canvas id="webgl-canvas" width="1280" height="720"></canvas>

    <!-- ロード画面 -->
    <div id="overlay">
        <div id="statusText">Loading...</div>
        <button id="fullScreenBtn" disabled>1.FullScreen</button>
        <button id="startBtn" disabled>2.Start</button>
    </div>

    <script type="module">
        const canvas = document.getElementById("webgl-canvas");
        const gl = canvas.getContext("webgl2");

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const width = window.innerWidth * dpr;
            const height = window.innerHeight * dpr;
            canvas.width = width;
            canvas.height = height;
            gl.viewport(0, 0, width, height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        import "./sessions.ts";
    </script>
</body>
</html>
